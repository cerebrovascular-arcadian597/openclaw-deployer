<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 小龙虾图标 -->
  <defs>
    <linearGradient id="bodyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ee5a5a"/>
    </linearGradient>
    <linearGradient id="clawGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff8e8e"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
  </defs>
  
  <!-- 身体 -->
  <ellipse cx="50" cy="55" rx="18" ry="25" fill="url(#bodyGradient)"/>
  
  <!-- 头部 -->
  <circle cx="50" cy="30" r="15" fill="url(#bodyGradient)"/>
  
  <!-- 眼睛 -->
  <circle cx="44" cy="25" r="4" fill="white"/>
  <circle cx="56" cy="25" r="4" fill="white"/>
  <circle cx="44" cy="25" r="2" fill="black"/>
  <circle cx="56" cy="25" r="2" fill="black"/>
  
  <!-- 触角 -->
  <path d="M40 20 Q35 10 30 5" stroke="#ff6b6b" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M60 20 Q65 10 70 5" stroke="#ff6b6b" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- 左钳子 -->
  <path d="M35 35 Q20 30 15 20 Q10 15 15 10 Q25 15 30 25" fill="url(#clawGradient)" stroke="#ee5a5a" stroke-width="1"/>
  <path d="M15 20 Q8 18 5 22" stroke="#ff6b6b" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- 右钳子 -->
  <path d="M65 35 Q80 30 85 20 Q90 15 85 10 Q75 15 70 25" fill="url(#clawGradient)" stroke="#ee5a5a" stroke-width="1"/>
  <path d="M85 20 Q92 18 95 22" stroke="#ff6b6b" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- 尾巴 -->
  <ellipse cx="50" cy="78" rx="12" ry="8" fill="#ff6b6b"/>
  <ellipse cx="50" cy="88" rx="8" ry="5" fill="#ee5a5a"/>
  
  <!-- 腿部 -->
  <line x1="35" y1="50" x2="25" y2="55" stroke="#ff6b6b" stroke-width="2" stroke-linecap="round"/>
  <line x1="35" y1="58" x2="25" y2="63" stroke="#ff6b6b" stroke-width="2" stroke-linecap="round"/>
  <line x1="65" y1="50" x2="75" y2="55" stroke="#ff6b6b" stroke-width="2" stroke-linecap="round"/>
  <line x1="65" y1="58" x2="75" y2="63" stroke="#ff6b6b" stroke-width="2" stroke-linecap="round"/>
</svg>
